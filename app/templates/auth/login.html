{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> Patient Login</h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i> 
                        <strong>Note:</strong> If you don't have an account, please contact your clinician or admin.
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label class="form-label">Email or Phone</label>
                            <input type="text" class="form-control" name="identifier" placeholder="Enter your email or phone" value="{{ request.form.get('identifier', '') }}" required autofocus>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>
                    
                    <div class="mt-3 text-center">
                        <a href="{{ url_for('auth.clinician_login') }}" class="text-decoration-none">
                            <i class="fas fa-user-md"></i> Clinician Login
                        </a>
                        <span class="mx-2">|</span>
                        <a href="{{ url_for('auth.admin_login') }}" class="text-decoration-none">
                            <i class="fas fa-user-shield"></i> Admin Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
