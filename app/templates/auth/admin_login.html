{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4><i class="fas fa-user-shield"></i> Admin Login</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" name="username" placeholder="Enter admin username" value="{{ request.form.get('username', '') }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">Admin Login</button>
                    </form>
                    
                    <div class="mt-3 text-center">
                        <a href="{{ url_for('auth.login') }}">Patient Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
