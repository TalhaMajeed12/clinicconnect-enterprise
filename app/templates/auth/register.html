{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4><i class="fas fa-user-plus"></i> Registration Disabled</h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle"></i>
                        Patient self-registration is disabled for security reasons.
                    </div>
                    <p>Patients are added by:</p>
                    <ul>
                        <li><strong>Administrators</strong> - via Admin Panel</li>
                        <li><strong>Clinicians</strong> - via Clinician Dashboard</li>
                    </ul>
                    <div class="mt-3">
                        <a href="{{ url_for('auth.login') }}" class="btn btn-primary">Go to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
