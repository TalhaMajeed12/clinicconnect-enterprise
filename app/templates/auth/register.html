{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4><i class="fas fa-user-plus"></i> Patient Registration</h4>
                </div>
                <div class="card-body">
                    <!-- Password Requirements Hint -->
                    <div class="alert alert-info">
                        <strong>Password Requirements:</strong>
                        <ul class="mb-0">
                            <li>At least 6 characters long</li>
                            <li>Must contain an uppercase letter (A-Z)</li>
                        </ul>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Full Name *</label>
                            <input type="text" class="form-control" name="full_name" value="{{ form.full_name if form else '' }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" class="form-control" name="email" value="{{ form.email if form else '' }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Phone *</label>
                            <input type="text" class="form-control" name="phone" value="{{ form.phone if form else '' }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Password *</label>
                            <input type="password" class="form-control" name="password" required>
                            <small class="text-muted">At least 6 characters with an uppercase letter</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Confirm Password *</label>
                            <input type="password" class="form-control" name="confirm_password" required>
                        </div>
                        
                        <!-- Role is always Patient - no selection needed -->
                        
                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>
                    
                    <div class="mt-3 text-center">
                        Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
                    </div>
                    <div class="text-center">
                        <a href="{{ url_for('auth.admin_login') }}">Admin Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
