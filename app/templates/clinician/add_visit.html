{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2><i class="fas fa-plus-circle"></i> Add Visit for {{ patient.user.full_name if patient.user else 'Unknown' }}</h2>
    <hr>
    
    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Chief Complaint *</label>
                    <textarea class="form-control" name="chief_complaint" rows="2" required></textarea>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">History of Presenting Illness</label>
                            <textarea class="form-control" name="history_of_presenting_illness" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Past Medical History</label>
                            <textarea class="form-control" name="past_medical_history" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Physical Examination</label>
                            <textarea class="form-control" name="physical_examination" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Primary Diagnosis</label>
                            <input type="text" class="form-control" name="primary_diagnosis">
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Height (cm)</label>
                            <input type="number" step="0.1" class="form-control" name="height">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Weight (kg)</label>
                            <input type="number" step="0.1" class="form-control" name="weight">
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label class="form-label">BP Systolic</label>
                            <input type="number" class="form-control" name="blood_pressure_systolic">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label class="form-label">BP Diastolic</label>
                            <input type="number" class="form-control" name="blood_pressure_diastolic">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label class="form-label">Heart Rate</label>
                            <input type="number" class="form-control" name="heart_rate">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label class="form-label">Temperature (°F)</label>
                            <input type="number" step="0.1" class="form-control" name="temperature">
                        </div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Treatment Plan</label>
                    <textarea class="form-control" name="treatment_plan" rows="2"></textarea>
                </div>
                
                <div class="mb-3">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" name="follow_up_required" id="follow_up">
                        <label class="form-check-label" for="follow_up">Follow-up Required</label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">Save Visit</button>
                <a href="{{ url_for('clinician.patient_folder', patient_id=patient.id) }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
