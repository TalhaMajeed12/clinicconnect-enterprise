{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2><i class="fas fa-user-plus"></i> Add Clinician</h2>
    <hr>
    
    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Username *</label>
                            <input type="text" class="form-control" name="username" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Password *</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Full Name *</label>
                            <input type="text" class="form-control" name="full_name" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email">
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" name="phone">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Specialty *</label>
                            <input type="text" class="form-control" name="specialty" required>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">License Number</label>
                            <input type="text" class="form-control" name="license_number">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Years Experience</label>
                            <input type="number" class="form-control" name="years_experience" value="0">
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Consultation Fee (PKR) *</label>
                            <input type="number" class="form-control" name="consultation_fee" id="fee" value="2000" required>
                            <small class="text-muted">Pre-payment = 25% of fee (4:1 ratio)</small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Pre-payment Amount</label>
                            <input type="text" class="form-control" id="prepayment" value="PKR 500" disabled>
                            <small class="text-muted">25% of consultation fee</small>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">Add Clinician</button>
                <a href="{{ url_for('admin.clinicians') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('fee').addEventListener('input', function() {
    const fee = parseFloat(this.value) || 0;
    document.getElementById('prepayment').value = 'PKR ' + Math.round(fee * 0.25);
});
</script>
{% endblock %}
